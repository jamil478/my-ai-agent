
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg: #e8f0f2;
            --shadow-light: #ffffff;
            --shadow-dark: #b8c6ca;
            --accent: #00d2ff;
        }

        body {
            margin: 0; background: var(--bg);
            height: 100vh; display: flex; justify-content: center;
            align-items: center; font-family: 'Inter', sans-serif;
        }

        /* ৩.৫ হাইব্রিড কার্ড */
        .neu-glass-card {
            width: 320px; padding: 40px;
            background: rgba(232, 240, 242, 0.7); /* সেমি-ট্রান্সপারেন্ট */
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px); /* গ্লাস ইফেক্ট */
            
            /* বাইরের নিউমরফিক শ্যাডো */
            box-shadow: 20px 20px 60px var(--shadow-dark),
                       -20px -20px 60px var(--shadow-light);
            
            text-align: center;
            position: relative;
        }

        .icon-circle {
            width: 80px; height: 80px; margin: 0 auto 20px;
            background: var(--bg);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px;
            
            /* ইনার শ্যাডো (Debossed Look) */
            box-shadow: inset 6px 6px 12px var(--shadow-dark),
                        inset -6px -6px 12px var(--shadow-light);
            color: var(--accent);
        }

        .neu-slider-track {
            width: 100%; height: 10px;
            background: var(--bg);
            border-radius: 10px; margin-top: 30px;
            box-shadow: inset 4px 4px 8px var(--shadow-dark),
                        inset -4px -4px 8px var(--shadow-light);
            position: relative;
        }

        .neu-slider-handle {
            position: absolute; top: -10px; left: 60%;
            width: 30px; height: 30px;
            background: var(--bg);
            border-radius: 50%;
            box-shadow: 4px 4px 10px var(--shadow-dark),
                       -4px -4px 10px var(--shadow-light);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="neu-glass-card">
        <div class="icon-circle">❄️</div>
        <h2 style="color: #556b72; font-weight: 300;">SILICONE UI</h2>
        <p style="color: #88a; font-size: 13px;">Hybrid Neumorphism combines frosted transparency with soft tactile volume.</p>
        
        <div class="neu-slider-track">
            <div class="neu-slider-handle"></div>
        </div>
    </div>

</body>
</html>
